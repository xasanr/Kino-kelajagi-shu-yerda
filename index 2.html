<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA ARENA PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:radial-gradient(circle at top,#0f2027,#203a43,#000);
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}
.game{
width:95%;
max-width:1000px;
text-align:center;
}
h1{
font-size:34px;
color:#00ffe7;
text-shadow:0 0 25px #00ffe7;
margin-bottom:15px;
}
.info{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:16px;
}
.arena{
height:500px;
background:linear-gradient(145deg,#111,#222);
border-radius:25px;
position:relative;
overflow:hidden;
box-shadow:
inset 0 0 70px rgba(0,255,255,0.4),
0 0 50px rgba(0,255,255,0.3);
}
.target{
position:absolute;
border-radius:50%;
cursor:pointer;
transition:transform .2s, opacity .2s;
box-shadow:0 0 25px rgba(255,255,255,0.6);
}
.target:hover{
transform:scale(1.2);
}
.bomb{
background:radial-gradient(circle,#ff0000,#550000);
box-shadow:0 0 30px red;
}
.gold{
background:radial-gradient(circle,#ffd700,#ff9900);
box-shadow:0 0 30px gold;
}
.normal{
background:radial-gradient(circle,#00ffe7,#007777);
}
.menu, .gameover{
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}
button{
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
background:#00ffe7;
font-weight:bold;
margin-top:15px;
}
button:hover{
transform:scale(1.05);
}
</style>
</head>
<body>

<div class="game">

<h1>⚡ ULTRA ARENA PRO</h1>

<div class="info">
<div>Score: <span id="score">0</span></div>
<div>Combo: <span id="combo">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Time: <span id="time">60</span></div>
<div>Life: <span id="life">3</span></div>
</div>

<div class="arena" id="arena">

<div class="menu" id="menu">
<h2>O'yinni Boshlash</h2>
<button onclick="startGame()">START</button>
</div>

<div class="gameover" id="gameover" style="display:none;">
<h2 id="finalText"></h2>
<button onclick="startGame()">Qayta Boshlash</button>
</div>

</div>

</div>

<script>
var arena=document.getElementById("arena");
var scoreEl=document.getElementById("score");
var comboEl=document.getElementById("combo");
var levelEl=document.getElementById("level");
var timeEl=document.getElementById("time");
var lifeEl=document.getElementById("life");
var menu=document.getElementById("menu");
var gameover=document.getElementById("gameover");
var finalText=document.getElementById("finalText");

var score=0, combo=0, level=1, time=60, life=3;
var spawnSpeed=1200;
var timer, spawner;

function rand(min,max){ return Math.floor(Math.random()*(max-min))+min; }

function startGame(){
score=0; combo=0; level=1; time=60; life=3; spawnSpeed=1200;
updateUI();
menu.style.display="none";
gameover.style.display="none";
clearInterval(timer);
clearInterval(spawner);
timer=setInterval(updateTime,1000);
spawner=setInterval(spawnTarget,spawnSpeed);
}

function updateUI(){
scoreEl.innerHTML=score;
comboEl.innerHTML=combo;
levelEl.innerHTML=level;
timeEl.innerHTML=time;
lifeEl.innerHTML=life;
}

function updateTime(){
time--;
if(time%15===0 && time>0){
level++;
spawnSpeed-=150;
clearInterval(spawner);
spawner=setInterval(spawnTarget,spawnSpeed);
}
if(time<=0 || life<=0){
endGame();
}
updateUI();
}

function spawnTarget(){
var t=document.createElement("div");
t.className="target";
var size=rand(40,90);
t.style.width=size+"px";
t.style.height=size+"px";
t.style.left=rand(0,arena.clientWidth-size)+"px";
t.style.top=rand(0,arena.clientHeight-size)+"px";

var type=Math.random();
var move=false;

if(type<0.15){
t.className+=" bomb";
}
else if(type<0.30){
t.className+=" gold";
}
else{
t.className+=" normal";
if(Math.random()<0.3){ move=true; }
}
t.onclick=function(){
if(t.className.indexOf("bomb")!=-1){
life--;
combo=0;
}
else if(t.className.indexOf("gold")!=-1){
score+=10;
combo++;
}
else{
score+=1+combo;
combo++;
}
updateUI();
arena.removeChild(t);
};

arena.appendChild(t);

if(move){
var dx=2, dy=2;
var moveInt=setInterval(function(){
var x=t.offsetLeft+dx;
var y=t.offsetTop+dy;
if(x<=0 || x>=arena.clientWidth-size) dx=-dx;
if(y<=0 || y>=arena.clientHeight-size) dy=-dy;
t.style.left=x+"px";
t.style.top=y+"px";
},20);
}

setTimeout(function(){
if(t.parentNode){
arena.removeChild(t);
combo=0;
updateUI();
}
},spawnSpeed);
}

function endGame(){
clearInterval(timer);
clearInterval(spawner);
gameover.style.display="flex";
finalText.innerHTML="O'yin Tugadi! Score: "+score;
}

</script>

</body>
</html>
